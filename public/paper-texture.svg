<svg xmlns="http://www.w3.org/2000/svg" width="220" height="220" viewBox="0 0 220 220">
  <!-- Local, self-contained subtle paper grain (replaces an external CDN texture
       to keep the PWA offline-friendly and avoid a privacy-leaking third-party request). -->
  <filter id="paperGrain">
    <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="5" stitchTiles="stitch" result="noise"/>
    <feColorMatrix in="noise" type="saturate" values="0"/>
  </filter>
  <rect width="220" height="220" filter="url(#paperGrain)" opacity="0.55"/>
</svg>
